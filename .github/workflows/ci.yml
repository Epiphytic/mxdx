name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pin to 1.93.1: rustc 1.94.0 has a trait solver regression
      # ("queries overflow the depth limit") when compiling matrix-sdk 0.16
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Check required tools
        run: |
          cargo --version
          rustc --version
          node --version
          npm --version

  build:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: sudo apt-get install -y libsqlite3-dev libssl-dev
      # Exclude mxdx-core-wasm: it uses rustls-tls while workspace default
      # uses native-tls — Cargo feature unification causes a conflict
      - run: cargo build --workspace --exclude mxdx-core-wasm

  manifest:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: sudo apt-get install -y libsqlite3-dev libssl-dev
      - run: cargo xtask manifest --check
        name: Verify MANIFEST.md is up to date

  types-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: sudo apt-get install -y libsqlite3-dev libssl-dev
      - run: cargo test -p mxdx-types

  launcher-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: sudo apt-get install -y libsqlite3-dev libssl-dev
      # tuwunel-dependent tests are #[ignore]'d; they run only in integration job
      - run: cargo test -p mxdx-launcher --lib

  policy-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: sudo apt-get install -y libsqlite3-dev libssl-dev
      - run: cargo test -p mxdx-policy --lib

  secrets-test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: sudo apt-get install -y libsqlite3-dev libssl-dev
      - run: cargo test -p mxdx-secrets --lib

  # P2P / interactive-session test jobs. These are vacuously green during
  # Phase 0 scaffolding; later phases populate real test bodies behind these
  # job names. Defined now so the CI shape is stable across the rollout.
  rust-p2p-unit:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        # cmake + g++ are needed by datachannel-sys (vendored libdatachannel
        # build). Both are preinstalled on ubuntu-latest images but listed
        # explicitly for image-drift resilience.
        run: sudo apt-get install -y libsqlite3-dev libssl-dev cmake g++
      - run: cargo test -p mxdx-p2p --lib

  rust-p2p-loopback:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        # Loopback test exercises the native WebRtcChannel via vendored
        # libdatachannel. The vendored build requires cmake and a C++17
        # compiler; libssl-dev covers any non-vendored TLS paths.
        run: sudo apt-get install -y libsqlite3-dev libssl-dev cmake g++
      - run: cargo test -p mxdx-p2p --tests

  # T-34: Musl / Alpine cross-compile verification for mxdx-p2p. The
  # production deployment target (see docs/plans and mxdx-hosting) is
  # Alpine musl. datachannel-sys with the vendored feature builds
  # libdatachannel and its transitive C/C++ deps (usrsctp, libjuice,
  # libsrtp, OpenSSL glue) from source — musl compatibility for the
  # full chain needs explicit verification rather than assumption.
  #
  # Non-blocking for Phase 3: if this job fails, the pipeline continues
  # to collect other build signals. Phase 6 (worker p2p wiring) or a
  # follow-up cleanup bead will address whatever breaks. For now the
  # job's status is informative, not gating.
  musl-build:
    needs: preflight
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          targets: x86_64-unknown-linux-musl
      - uses: Swatinem/rust-cache@v2
      - name: Install musl toolchain + native build deps
        run: |
          sudo apt-get install -y musl-tools cmake g++ pkg-config
      - name: Build mxdx-p2p for musl
        env:
          CC_x86_64_unknown_linux_musl: musl-gcc
          CXX_x86_64_unknown_linux_musl: musl-g++
          CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
        run: cargo build -p mxdx-p2p --target x86_64-unknown-linux-musl

  # T-33: Platform matrix build-only. Confirms mxdx-p2p (which pulls in
  # vendored libdatachannel) compiles on the production targets we expect
  # to ship. macOS needs cmake via Homebrew (xcode command-line tools
  # provide the C++ compiler).
  build-only-native:
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libsqlite3-dev libssl-dev cmake g++
      - name: Install system deps (macOS)
        if: runner.os == 'macOS'
        # GitHub-hosted macOS runners ship cmake + xcode CLI tools; this
        # is a no-op safety net. HOMEBREW_NO_AUTO_UPDATE speeds up the
        # step when brew decides it needs to refresh.
        run: |
          export HOMEBREW_NO_AUTO_UPDATE=1
          brew list cmake >/dev/null 2>&1 || brew install cmake
      - run: cargo build -p mxdx-p2p

  wasm-p2p-smoke:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      # Phase 8 wires the wasm path. For now this confirms the crate
      # cross-compiles to wasm32-unknown-unknown so any accidental
      # native-only dep added in early phases is caught immediately.
      - run: cargo check -p mxdx-p2p --target wasm32-unknown-unknown

  security-grep:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify no unencrypted-send patterns in mxdx-p2p
        run: bash scripts/check-no-unencrypted-sends.sh
      - name: Self-test the grep gate
        run: bash scripts/check-no-unencrypted-sends.sh --self-test

  # Integration and federation tests require tuwunel.
  # Gated to workflow_dispatch until beta.mxdx.dev infrastructure is available.
  integration:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: sudo apt-get install -y libsqlite3-dev libssl-dev tmux
      - name: Install tuwunel
        run: |
          curl -fsSL -o /tmp/tuwunel.deb \
            "https://github.com/matrix-construct/tuwunel/releases/download/v1.5.0/v1.5.0-release-all-x86_64-v1-linux-gnu-tuwunel.deb"
          sudo dpkg -i /tmp/tuwunel.deb
      - run: cargo test -p mxdx-test-helpers
      - run: cargo test -p mxdx-matrix
      - run: cargo test -p mxdx-launcher --test e2e_command
      - run: cargo test -p mxdx-launcher --test e2e_terminal_session
      - run: cargo test -p mxdx-policy --test appservice_registration
      - run: cargo test -p mxdx-policy --test policy_enforcement
      - run: cargo test -p mxdx-secrets --test e2e_secret_request
      - run: cargo test -p mxdx-launcher --test e2e_full_system
      - run: cargo test -p mxdx-launcher --lib -- --include-ignored

  federation:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
      - uses: Swatinem/rust-cache@v2
      - name: Install system deps
        run: sudo apt-get install -y libsqlite3-dev libssl-dev tmux
      - name: Install tuwunel
        run: |
          curl -fsSL -o /tmp/tuwunel.deb \
            "https://github.com/matrix-construct/tuwunel/releases/download/v1.5.0/v1.5.0-release-all-x86_64-v1-linux-gnu-tuwunel.deb"
          sudo dpkg -i /tmp/tuwunel.deb
      - name: Run federation tests
        run: cargo test -p mxdx-test-helpers -- --include-ignored
      - name: Run multi-HS launcher tests
        run: cargo test -p mxdx-launcher --lib multi_hs -- --include-ignored

  client-build:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd client && npm ci && npm run build

  client-test:
    needs: client-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: cd client && npm ci && npm test

  npm-e2e:
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      # Tuwunel not installed — npm E2E tests that need it will skip gracefully
      - name: Build WASM (nodejs)
        run: wasm-pack build crates/mxdx-core-wasm --target nodejs --out-dir ../../packages/core/wasm/nodejs
      - name: Build WASM (web)
        run: wasm-pack build crates/mxdx-core-wasm --target web --out-dir ../../packages/core/wasm/web
      - name: Install npm dependencies
        run: npm install
      - name: Run launcher unit tests
        run: node --test packages/launcher/tests/runtime-unit.test.js
      - name: Run local E2E tests (onboarding)
        run: node --test packages/e2e-tests/tests/launcher-onboarding.test.js
      - name: Run local E2E tests (commands)
        run: node --test packages/e2e-tests/tests/launcher-commands.test.js

  npm-pack:
    needs: npm-e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM (nodejs)
        run: wasm-pack build crates/mxdx-core-wasm --target nodejs --out-dir ../../packages/core/wasm/nodejs
      - name: Build WASM (web)
        run: wasm-pack build crates/mxdx-core-wasm --target web --out-dir ../../packages/core/wasm/web
      - name: Install npm deps
        run: npm install
      - name: Build web-console
        run: cd packages/web-console && npx vite build
      - name: Pack all packages (dry-run)
        run: |
          cd packages/core && npm pack --dry-run && cd ../..
          cd packages/launcher && npm pack --dry-run && cd ../..
          cd packages/client && npm pack --dry-run && cd ../..
          cd packages/web-console && npm pack --dry-run && cd ../..
          cd packages/mxdx && npm pack --dry-run && cd ../..
      - name: Smoke test dispatcher
        run: |
          node packages/mxdx/bin/mxdx.js --help
          node packages/mxdx/bin/mxdx.js launcher --help
          node packages/mxdx/bin/mxdx.js client --help

  npm-public-server:
    needs: preflight
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    env:
      TEST_SERVER_URL: ${{ secrets.TEST_SERVER_URL }}
      TEST_ACCOUNT1_USERNAME: ${{ secrets.TEST_ACCOUNT1_USERNAME }}
      TEST_ACCOUNT1_PASSWORD: ${{ secrets.TEST_ACCOUNT1_PASSWORD }}
      TEST_ACCOUNT2_USERNAME: ${{ secrets.TEST_ACCOUNT2_USERNAME }}
      TEST_ACCOUNT2_PASSWORD: ${{ secrets.TEST_ACCOUNT2_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          targets: wasm32-unknown-unknown
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh
      - name: Build WASM (nodejs)
        run: wasm-pack build crates/mxdx-core-wasm --target nodejs --out-dir ../../packages/core/wasm/nodejs
      - name: Install npm dependencies
        run: npm install
      - name: Write test credentials
        run: |
          cat > test-credentials.toml <<TOML
          [server]
          url = "$TEST_SERVER_URL"

          [account1]
          username = "$TEST_ACCOUNT1_USERNAME"
          password = "$TEST_ACCOUNT1_PASSWORD"

          [account2]
          username = "$TEST_ACCOUNT2_USERNAME"
          password = "$TEST_ACCOUNT2_PASSWORD"
          TOML
      - name: Run public server tests
        run: node --test packages/e2e-tests/tests/public-server.test.js

  e2e-release:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Pin to 1.93.1: rustc 1.94.0 has a trait solver regression
      # ("queries overflow the depth limit") when compiling matrix-sdk 0.16
      - uses: dtolnay/rust-toolchain@1.93.1
        with:
          targets: wasm32-unknown-unknown

      - uses: Swatinem/rust-cache@v2

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install system deps
        run: sudo apt-get install -y libsqlite3-dev libssl-dev tmux

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Write test credentials
        run: echo "$TEST_CREDENTIALS_TOML" > test-credentials.toml
        env:
          TEST_CREDENTIALS_TOML: ${{ secrets.TEST_CREDENTIALS_TOML }}

      - name: Run E2E test suite (release profile)
        run: ./scripts/e2e-test-suite.sh --profile release

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 90

      - name: Render Rust test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Rust E2E Tests
          path: test-results/rust-e2e-junit.xml
          reporter: java-junit
          fail-on-error: false

      - name: Render npm test report
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: npm E2E Tests
          path: test-results/npm-e2e-junit.xml
          reporter: java-junit
          fail-on-error: false
